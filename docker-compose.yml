# API + nightly automation for a single VPS.
#
#   docker compose up -d --build      # start the API
#   docker compose run --rm sync      # one-off: refresh reviews.json
#
# The "cron" service runs the sync + cross-reference scripts on a schedule.
services:
  api:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_PATH: /data/shitrentals.db
      # Origin(s) allowed to call the API from a browser (the Pages site).
      # Comma-separated. Leave empty if the API also serves the frontend.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    volumes:
      - db:/data
      # Re-seed source: scripts write a fresh reviews.json here, the API reads it.
      - ./data:/app/data:ro
    ports:
      # Bind to localhost only; put a TLS reverse proxy (Caddy/Nginx) in front.
      # Host port is configurable (API_HOST_PORT) so it won't clash with other
      # services on a shared box; the container always listens on 3001.
      - "127.0.0.1:${API_HOST_PORT:-3001}:3001"

  # On-demand data refresh. Run via `docker compose run --rm sync`, or let the
  # host crontab call it (see deploy.md). Shares the source image + data dir.
  # Refreshes data/reviews.json from the public Airtable share (writes to the
  # bind-mounted ./data). Follow with the reseed service to apply it to the DB.
  sync:
    build: .
    profiles: ["tools"]
    command: ["npm", "run", "sync"]
    volumes:
      - ./data:/app/data

  # Applies a refreshed data/reviews.json to the live DB volume, preserving the
  # listing matches. Shares the api's db volume + DB_PATH.
  reseed:
    build: .
    profiles: ["tools"]
    command: ["npm", "run", "reseed"]
    environment:
      DB_PATH: /data/shitrentals.db
    volumes:
      - db:/data
      - ./data:/app/data

  # Writes "currently listed" matches straight into the API's database, so it
  # must share the same db volume and DB_PATH as the api service (not the
  # ./data copy). ./data is still mounted for the postcode cache + the
  # rental-matches.{json,csv} artifacts it also emits.
  cross-reference:
    build: .
    profiles: ["tools"]
    # Incremental update (cron path): refresh suburbs that already have matches
    # and discover a rotating batch of new ones. For a full rebuild run
    # `docker compose run --rm cross-reference npm run cross-reference`.
    command: ["npm", "run", "cross-reference:update"]
    environment:
      DB_PATH: /data/shitrentals.db
    volumes:
      - db:/data
      - ./data:/app/data

volumes:
  db:
